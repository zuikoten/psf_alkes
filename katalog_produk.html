<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog Produk - PSF Alkes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --color-primary: #1565c0;
        --color-primary-dark: #0d47a1;
        --color-secondary: #4a9fe8;
        --color-light: #90caf9;
        --color-soft: #e3f2fd;
        --color-text-primary: #1565c0;
        --color-text-muted: #6b7280;
        --color-bg-page: #f5f9ff;
        --color-white: #ffffff;
      }

      body {
        background-color: var(--color-bg-page);
      }
      .text-primary {
        color: var(--color-text-primary);
      }
      .text-muted {
        color: var(--color-text-muted);
      }
      .bg-soft {
        background-color: var(--color-soft);
      }

      .filter-card {
        background: var(--color-white);
        border: 1px solid var(--color-soft);
      }
      .filter-input {
        border: 1px solid #d1d5db;
        transition: border-color 0.2s;
      }
      .filter-input:focus {
        outline: none;
        border-color: var(--color-secondary);
      }
      .btn-reset {
        background-color: #6b7280;
        color: var(--color-white);
        transition: background-color 0.2s;
      }
      .btn-reset:hover {
        background-color: #4b5563;
      }

      .product-card {
        background-color: var(--color-white);
        border: 1px solid var(--color-soft);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .product-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(21, 101, 192, 0.12);
      }
      .product-price {
        color: var(--color-primary);
      }
      .product-icon {
        color: var(--color-light);
      }
      .product-badge {
        background-color: var(--color-soft);
        color: var(--color-primary);
      }

      .btn-whatsapp {
        background-color: #25d366;
        color: var(--color-white);
        transition: background-color 0.2s;
      }
      .btn-whatsapp:hover {
        background-color: #1ebe5a;
      }

      /* ── Pagination ──────────────────────────────────── */
      .pagination-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 2.25rem;
        height: 2.25rem;
        padding: 0 0.5rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        border: 1px solid #d1d5db;
        background: var(--color-white);
        color: #374151;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .pagination-btn:hover:not(:disabled):not(.active) {
        border-color: var(--color-secondary);
        color: var(--color-primary);
        background: var(--color-soft);
      }
      .pagination-btn.active {
        background: var(--color-primary);
        border-color: var(--color-primary);
        color: #fff;
        cursor: default;
      }
      .pagination-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .pagination-btn.ellipsis {
        border: none;
        background: transparent;
        cursor: default;
        pointer-events: none;
      }

      .footer {
        background-color: var(--color-primary-dark, #0d47a1);
      }
      .footer-sub {
        color: var(--color-light);
      }

      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .line-clamp-1 {
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <div id="navbar"></div>
    <script src="/navbar.js"></script>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">Katalog Produk</h1>
      <p class="text-muted mb-8">Temukan alat kesehatan yang Anda butuhkan</p>

      <!-- Search & Filter -->
      <div class="filter-card rounded-lg shadow-sm p-6 mb-8">
        <div class="flex flex-col md:flex-row gap-4">
          <div class="flex-1">
            <label class="block font-semibold text-gray-700 mb-2">
              <i class="fas fa-search text-primary mr-1"></i> Cari Produk
            </label>
            <input
              type="text"
              id="searchInput"
              placeholder="Cari nama produk..."
              class="filter-input w-full px-4 py-2 rounded-lg"
            />
          </div>

          <div class="md:w-64">
            <label class="block font-semibold text-gray-700 mb-2">
              <i class="fas fa-filter text-primary mr-1"></i> Kategori
            </label>
            <select
              id="categoryFilter"
              class="filter-input w-full px-4 py-2 rounded-lg"
            >
              <option value="all">Semua Kategori</option>
            </select>
          </div>

          <div class="flex items-end">
            <button id="resetFilter" class="btn-reset px-6 py-2 rounded-lg">
              <i class="fas fa-undo-alt"></i> Reset
            </button>
          </div>
        </div>
      </div>

      <!-- Count & per-page -->
      <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
        <p id="productCount" class="text-muted text-sm"></p>
        <div class="flex items-center gap-2 text-sm text-muted">
          <span>Tampilkan</span>
          <select
            id="limitSelect"
            class="filter-input px-2 py-1 rounded-lg text-sm"
          >
            <option value="12">12</option>
            <option value="24">24</option>
            <option value="48">48</option>
          </select>
          <span>per halaman</span>
        </div>
      </div>

      <!-- Products Grid -->
      <div
        id="productsGrid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
      >
        <div class="col-span-full text-center py-10 text-muted">
          <i class="fas fa-spinner fa-spin text-3xl"></i>
          <p class="mt-2">Memuat produk...</p>
        </div>
      </div>

      <!-- Pagination -->
      <div
        id="paginationWrapper"
        class="mt-10 flex flex-col items-center gap-3 hidden"
      >
        <div
          id="paginationControls"
          class="flex flex-wrap justify-center gap-1.5"
        ></div>
        <p id="paginationInfo" class="text-sm text-muted"></p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer text-white py-8 mt-12">
      <div class="container mx-auto px-4 text-center">
        <p class="font-semibold">
          &copy; 2026 PSF Alkes - Toko Alat Kesehatan Terpercaya
        </p>
        <p class="text-sm footer-sub mt-1">
          Melayani kebutuhan medis rumah sakit, klinik, dan pribadi
        </p>
        <div class="border-t border-blue-700 mt-4 pt-4">
          <p class="text-sm footer-sub">
            part of
            <span class="font-semibold text-white"
              >Group of PT. Hatamed Industri Utama</span
            >
          </p>
          <p class="text-xs footer-sub mt-1">
            Izin Kemenkes RI &middot; AKD 21603129105
          </p>
        </div>
      </div>
    </footer>

    <script>
      // ── State ──────────────────────────────────────────────────────────
      let currentPage = 1;
      let totalPages = 1;
      let totalProducts = 0;
      let categoriesMap = {};
      let searchTimeout = null;

      // ── Helpers ────────────────────────────────────────────────────────
      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(
          /[&<>"']/g,
          (m) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[m],
        );
      }

      function getFilters() {
        return {
          search: document.getElementById("searchInput").value.trim(),
          kategori: document.getElementById("categoryFilter").value,
          limit: parseInt(document.getElementById("limitSelect").value),
        };
      }

      // ── Fetch categories (unchanged) ───────────────────────────────────
      async function loadCategories() {
        try {
          const res = await fetch("/.netlify/functions/get-categories");
          const { categories, error } = await res.json();
          if (error) throw new Error(error);

          categoriesMap = {};
          (categories || []).forEach((c) => {
            categoriesMap[c.id] = c.nama_kategori;
          });

          const sel = document.getElementById("categoryFilter");
          sel.innerHTML = '<option value="all">Semua Kategori</option>';
          (categories || []).forEach((c) => {
            sel.innerHTML += `<option value="${c.id}">${escapeHtml(c.nama_kategori)}</option>`;
          });
        } catch (e) {
          console.error("Error loading categories:", e);
        }
      }

      // ── Fetch products (server-side, paginated) ────────────────────────
      async function loadProducts(page = 1) {
        const grid = document.getElementById("productsGrid");
        grid.innerHTML = `
                <div class="col-span-full text-center py-10 text-muted">
                    <i class="fas fa-spinner fa-spin text-3xl"></i>
                    <p class="mt-2">Memuat produk...</p>
                </div>`;
        document.getElementById("paginationWrapper").classList.add("hidden");

        const { search, kategori, limit } = getFilters();

        const params = new URLSearchParams({
          mode: "katalog",
          page: page,
          limit: limit,
          search: search,
          kategori: kategori,
        });

        try {
          const res = await fetch(`/.netlify/functions/get-products?${params}`);
          const json = await res.json();

          if (!json.success) throw new Error(json.error || "Gagal memuat");

          const { data: products, pagination } = json;
          currentPage = pagination.page;
          totalPages = pagination.totalPages;
          totalProducts = pagination.total;

          // Update count info
          const from = (currentPage - 1) * pagination.limit + 1;
          const to = Math.min(currentPage * pagination.limit, totalProducts);
          document.getElementById("productCount").innerText =
            totalProducts > 0
              ? `Menampilkan ${from}–${to} dari ${totalProducts} produk`
              : "0 produk ditemukan";

          // Render cards
          if (!products || products.length === 0) {
            grid.innerHTML = `
                        <div class="col-span-full text-center py-10 text-muted">
                            <i class="fas fa-box-open text-4xl"></i>
                            <p class="mt-2">Tidak ada produk yang sesuai</p>
                        </div>`;
            return;
          }

          grid.innerHTML = products
            .map(
              (p) => `
                    <div class="product-card rounded-xl overflow-hidden">
                        <div class="h-48 bg-soft flex items-center justify-center">
                            ${
                              p.gambar_url
                                ? `<img src="${escapeHtml(p.gambar_url)}" alt="${escapeHtml(p.nama)}" class="w-full h-full object-cover">`
                                : `<i class="fas fa-medkit text-6xl product-icon"></i>`
                            }
                        </div>
                        <div class="p-4">
                            <div class="flex justify-between items-start mb-2 gap-2">
                                <h3 class="font-bold text-lg text-gray-800 line-clamp-1">${escapeHtml(p.nama)}</h3>
                                ${
                                  p.kategori_id && categoriesMap[p.kategori_id]
                                    ? `<span class="text-xs product-badge px-2 py-1 rounded shrink-0">${escapeHtml(categoriesMap[p.kategori_id])}</span>`
                                    : ""
                                }
                            </div>
                            <p class="product-price font-bold text-xl mt-2">Rp ${p.harga.toLocaleString("id-ID")}</p>
                            <p class="text-sm text-muted mt-1 line-clamp-2">${escapeHtml(p.deskripsi || "Alat kesehatan medis standar")}</p>
                            <button onclick='orderViaWhatsApp(${JSON.stringify(p.nama)}, ${p.harga})'
                                    class="btn-whatsapp mt-4 w-full font-semibold py-2 rounded-lg flex items-center justify-center space-x-2">
                                <i class="fab fa-whatsapp"></i>
                                <span>Beli via WhatsApp</span>
                            </button>
                        </div>
                    </div>
                `,
            )
            .join("");

          renderPagination(pagination);
        } catch (e) {
          console.error("Error:", e);
          grid.innerHTML = `
                    <div class="col-span-full text-center text-red-500 py-10">
                        <i class="fas fa-exclamation-circle text-4xl"></i>
                        <p class="mt-2">Gagal memuat produk.</p>
                        <p class="text-sm mt-1">${escapeHtml(e.message)}</p>
                    </div>`;
        }
      }

      // ── Render pagination controls ─────────────────────────────────────
      function renderPagination(pagination) {
        const wrapper = document.getElementById("paginationWrapper");
        const controls = document.getElementById("paginationControls");
        const info = document.getElementById("paginationInfo");

        if (pagination.totalPages <= 1) {
          wrapper.classList.add("hidden");
          return;
        }

        wrapper.classList.remove("hidden");
        info.textContent = `Halaman ${pagination.page} dari ${pagination.totalPages}`;

        // Build page number list with ellipsis
        const pages = buildPageList(pagination.page, pagination.totalPages);

        controls.innerHTML = "";

        // Prev button
        const prevBtn = makeBtn("‹ Sebelumnya", !pagination.hasPrev);
        prevBtn.addEventListener("click", () => goToPage(currentPage - 1));
        controls.appendChild(prevBtn);

        // Page numbers
        pages.forEach((p) => {
          if (p === "…") {
            const el = makeBtn("…");
            el.classList.add("ellipsis");
            controls.appendChild(el);
          } else {
            const el = makeBtn(p, false, p === currentPage);
            el.addEventListener("click", () => goToPage(p));
            controls.appendChild(el);
          }
        });

        // Next button
        const nextBtn = makeBtn("Berikutnya ›", !pagination.hasNext);
        nextBtn.addEventListener("click", () => goToPage(currentPage + 1));
        controls.appendChild(nextBtn);
      }

      function makeBtn(label, disabled = false, active = false) {
        const el = document.createElement("button");
        el.className = "pagination-btn";
        el.textContent = label;
        el.disabled = disabled;
        if (active) el.classList.add("active");
        return el;
      }

      // Show at most 7 page slots: first, last, current ±1, ellipsis
      function buildPageList(current, total) {
        if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);

        const pages = new Set([1, total, current, current - 1, current + 1]);
        const sorted = [...pages]
          .filter((p) => p >= 1 && p <= total)
          .sort((a, b) => a - b);

        const result = [];
        let prev = 0;
        for (const p of sorted) {
          if (p - prev > 1) result.push("…");
          result.push(p);
          prev = p;
        }
        return result;
      }

      function goToPage(page) {
        if (page < 1 || page > totalPages || page === currentPage) return;
        window.scrollTo({ top: 0, behavior: "smooth" });
        loadProducts(page);
      }

      // ── WhatsApp order ─────────────────────────────────────────────────
      window.orderViaWhatsApp = function (namaProduk, harga) {
        const phoneNumber = "6281234567890";
        const message = `Halo PSF Alkes,%0A%0ASaya ingin memesan produk berikut:%0A*${encodeURIComponent(namaProduk)}*%0AHarga: Rp ${harga.toLocaleString("id-ID")}%0A%0ATolong informasi lebih lanjut untuk pembayaran dan pengiriman. Terima kasih.`;
        window.open(`https://wa.me/${phoneNumber}?text=${message}`, "_blank");
      };

      // ── Events ─────────────────────────────────────────────────────────
      document.getElementById("searchInput").addEventListener("input", () => {
        clearTimeout(searchTimeout);
        // Debounce 400 ms supaya tidak fetch tiap ketikan
        searchTimeout = setTimeout(() => {
          currentPage = 1;
          loadProducts(1);
        }, 400);
      });

      document
        .getElementById("categoryFilter")
        .addEventListener("change", () => {
          currentPage = 1;
          loadProducts(1);
        });

      document.getElementById("limitSelect").addEventListener("change", () => {
        currentPage = 1;
        loadProducts(1);
      });

      document.getElementById("resetFilter").addEventListener("click", () => {
        document.getElementById("searchInput").value = "";
        document.getElementById("categoryFilter").value = "all";
        document.getElementById("limitSelect").value = "12";
        currentPage = 1;
        loadProducts(1);
      });

      // ── Init ───────────────────────────────────────────────────────────
      document.addEventListener("DOMContentLoaded", async () => {
        await loadCategories();
        await loadProducts(1);
      });
    </script>
  </body>
</html>
