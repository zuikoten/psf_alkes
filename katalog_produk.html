<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk - PSF Alkes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* =============================================
           CSS VARIABLES — GANTI WARNA DI SINI
        ============================================= */
        :root {
            --color-primary:        #1565C0;   /* biru solid cerah — warna utama */
            --color-primary-dark:   #0D47A1;   /* biru lebih gelap untuk hover */
            --color-secondary:      #4A9FE8;   /* biru muda terang — aksen & navbar */
            --color-light:          #90CAF9;   /* biru langit — icon & highlight */
            --color-soft:           #E3F2FD;   /* biru sangat muda — bg section */
            --color-text-primary:   #1565C0;
            --color-text-muted:     #6B7280;
            --color-bg-page:        #F5F9FF;
            --color-white:          #FFFFFF;
            --color-danger:         #DC2626;
        }

        /* =============================================
           UTILITY CLASSES
        ============================================= */
        body                    { background-color: var(--color-bg-page); }

        .text-primary           { color: var(--color-text-primary); }
        .text-muted             { color: var(--color-text-muted); }
        .bg-soft                { background-color: var(--color-soft); }

        /* Filter card */
        .filter-card {
            background: var(--color-white);
            border: 1px solid var(--color-soft);
        }
        .filter-label           { color: #374151; font-weight: 600; }
        .filter-input {
            border: 1px solid #D1D5DB;
            transition: border-color 0.2s;
        }
        .filter-input:focus {
            outline: none;
            border-color: var(--color-secondary);
        }
        .btn-reset {
            background-color: #6B7280;
            color: var(--color-white);
            transition: background-color 0.2s;
        }
        .btn-reset:hover        { background-color: #4B5563; }

        /* Product card */
        .product-card {
            background-color: var(--color-white);
            border: 1px solid var(--color-soft);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(21, 101, 192, 0.12);
        }
        .product-price          { color: var(--color-primary); }
        .product-icon           { color: var(--color-light); }
        .product-badge {
            background-color: var(--color-soft);
            color: var(--color-primary);
        }

        /* WhatsApp button */
        .btn-whatsapp {
            background-color: #25D366;
            color: var(--color-white);
            transition: background-color 0.2s;
        }
        .btn-whatsapp:hover     { background-color: #1EBE5A; }

        /* Footer */
        .footer                 { background-color: var(--color-primary-dark, #0D47A1); }
        .footer-sub             { color: var(--color-light); }

        /* line-clamp */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div id="navbar"></div>
<script src="/navbar.js"></script>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Katalog Produk</h1>
        <p class="text-muted mb-8">Temukan alat kesehatan yang Anda butuhkan</p>

        <!-- Search & Filter -->
        <div class="filter-card rounded-lg shadow-sm p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label class="block filter-label mb-2">
                        <i class="fas fa-search text-primary mr-1"></i> Cari Produk
                    </label>
                    <input type="text" id="searchInput" placeholder="Cari nama produk..."
                           class="filter-input w-full px-4 py-2 rounded-lg">
                </div>

                <div class="md:w-64">
                    <label class="block filter-label mb-2">
                        <i class="fas fa-filter text-primary mr-1"></i> Kategori
                    </label>
                    <select id="categoryFilter" class="filter-input w-full px-4 py-2 rounded-lg">
                        <option value="all">Semua Kategori</option>
                    </select>
                </div>

                <div class="flex items-end">
                    <button id="resetFilter" class="btn-reset px-6 py-2 rounded-lg">
                        <i class="fas fa-undo-alt"></i> Reset
                    </button>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
            <p id="productCount" class="text-muted">0 produk ditemukan</p>
        </div>

        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-10 text-muted">
                <i class="fas fa-spinner fa-spin text-3xl"></i>
                <p class="mt-2">Memuat produk...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer text-white py-8 mt-12">
    <div class="container mx-auto px-4 text-center">
        <p class="font-semibold">&copy; 2026 PSF Alkes - Toko Alat Kesehatan Terpercaya</p>
        <p class="text-sm footer-sub mt-1">Melayani kebutuhan medis rumah sakit, klinik, dan pribadi</p>
        <div class="border-t border-blue-700 mt-4 pt-4">
            <p class="text-sm footer-sub">part of <span class="font-semibold text-white">Group of PT. Hatamed Industri Utama</span></p>
            <p class="text-xs footer-sub mt-1">Izin Kemenkes RI &middot; AKD 21603129105</p>
        </div>
    </div>
</footer>

    <script>
        let allProducts = [];

        async function loadCategories() {
            try {
                const response = await fetch('/.netlify/functions/get-categories');
                const { categories, error } = await response.json();

                if (error) throw new Error(error);

                const categorySelect = document.getElementById('categoryFilter');
                categorySelect.innerHTML = '<option value="all">Semua Kategori</option>';

                if (categories && categories.length > 0) {
                    categories.forEach(cat => {
                        categorySelect.innerHTML += `<option value="${cat}">${cat}</option>`;
                    });
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function loadAllProducts() {
            try {
                const response = await fetch('/.netlify/functions/get-products');
                const { data, error } = await response.json();

                if (error) throw new Error(error);

                allProducts = data || [];
                filterAndRenderProducts();
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsGrid').innerHTML = `
                    <div class="col-span-full text-center text-red-500 py-10">
                        <i class="fas fa-exclamation-circle text-4xl"></i>
                        <p class="mt-2">Gagal memuat produk. Pastikan Netlify Functions sudah terdeploy.</p>
                        <p class="text-sm mt-2">Error: ${error.message}</p>
                    </div>
                `;
            }
        }

        function filterAndRenderProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedCategory = document.getElementById('categoryFilter').value;

            let filtered = allProducts.filter(product => {
                const matchesSearch = product.nama.toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategory === 'all' || product.kategori === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            document.getElementById('productCount').innerText = `${filtered.length} produk ditemukan`;

            const grid = document.getElementById('productsGrid');

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-10 text-muted">
                        <i class="fas fa-box-open text-4xl"></i>
                        <p class="mt-2">Tidak ada produk yang sesuai</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(product => `
                <div class="product-card rounded-xl overflow-hidden">
                    <div class="h-48 bg-soft flex items-center justify-center">
                        ${product.gambar_url ?
                            `<img src="${product.gambar_url}" alt="${product.nama}" class="w-full h-full object-cover">` :
                            `<i class="fas fa-medkit text-6xl product-icon"></i>`
                        }
                    </div>
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-2 gap-2">
                            <h3 class="font-bold text-lg text-gray-800 line-clamp-1">${escapeHtml(product.nama)}</h3>
                            ${product.kategori ? `<span class="text-xs product-badge px-2 py-1 rounded shrink-0">${escapeHtml(product.kategori)}</span>` : ''}
                        </div>
                        <p class="product-price font-bold text-xl mt-2">Rp ${product.harga.toLocaleString('id-ID')}</p>
                        <p class="text-sm text-muted mt-1 line-clamp-2">${escapeHtml(product.deskripsi || 'Alat kesehatan medis standar')}</p>
                        <button onclick='orderViaWhatsApp("${escapeHtml(product.nama).replace(/'/g, "\\'")}", ${product.harga})'
                                class="btn-whatsapp mt-4 w-full font-semibold py-2 rounded-lg flex items-center justify-center space-x-2">
                            <i class="fab fa-whatsapp"></i>
                            <span>Beli via WhatsApp</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        window.orderViaWhatsApp = function(namaProduk, harga) {
            const phoneNumber = "6281234567890";
            const message = `Halo PSF Alkes,%0A%0ASaya ingin memesan produk berikut:%0A*${namaProduk}*%0AHarga: Rp ${harga.toLocaleString('id-ID')}%0A%0ATolong informasi lebih lanjut untuk pembayaran dan pengiriman. Terima kasih.`;
            window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
        };

        document.getElementById('searchInput').addEventListener('input', filterAndRenderProducts);
        document.getElementById('categoryFilter').addEventListener('change', filterAndRenderProducts);
        document.getElementById('resetFilter').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = 'all';
            filterAndRenderProducts();
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await loadCategories();
            await loadAllProducts();
        });
    </script>
</body>
</html>
