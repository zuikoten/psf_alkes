<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MediStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .modal { transition: all 0.3s ease; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .table-wrapper { overflow-x: auto; }
    </style>
</head>
<body class="bg-gray-100">

<!-- Login Screen -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-r from-teal-500 to-blue-600">
    <div class="bg-white rounded-lg shadow-xl p-8 w-96">
        <div class="text-center mb-6">
            <i class="fas fa-lock text-4xl text-teal-600"></i>
            <h2 class="text-2xl font-bold mt-2">Admin Login</h2>
            <p class="text-gray-500 text-sm">Masukkan password untuk mengakses dashboard</p>
        </div>
        <input type="password" id="passwordInput" placeholder="Password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-teal-500 mb-4">
        <button onclick="checkPassword()" class="w-full bg-teal-600 text-white py-2 rounded-lg hover:bg-teal-700 transition">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </div>
</div>

<!-- Main Admin Dashboard -->
<div id="adminDashboard" style="display: none;">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center space-x-2">
                <i class="fas fa-hospital-user text-teal-600 text-2xl"></i>
                <span class="text-xl font-bold text-teal-700">MediStore Admin</span>
            </div>
            <div class="flex space-x-2">
                <button onclick="loadProducts()" class="px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 text-sm">
                    <i class="fas fa-boxes"></i> All Produk
                </button>
                <button onclick="showAddModal()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm">
                    <i class="fas fa-plus"></i> Tambah
                </button>
                <button onclick="logout()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div id="productsContainer">
            <div class="text-center py-10 text-gray-500">Memuat produk...</div>
        </div>
    </div>
</div>

<!-- Modal Form -->
<div id="productModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4 max-h-screen overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-2xl font-bold">Tambah Produk</h2>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Nama Produk *</label>
                    <input type="text" id="nama" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-teal-500">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Kategori *</label>
                    <select id="kategori" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-teal-500">
                        <option value="">Pilih Kategori</option>
                        <option value="Alat Ukur">Alat Ukur</option>
                        <option value="APD">APD</option>
                        <option value="Diagnostik">Diagnostik</option>
                        <option value="Perawatan">Perawatan</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Harga (Rp) *</label>
                    <input type="number" id="harga" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-teal-500">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Deskripsi</label>
                    <textarea id="deskripsi" rows="3" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-teal-500"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Gambar Produk</label>
                    <input type="file" id="gambar" accept="image/*" class="w-full px-4 py-2 border rounded-lg">
                    <div id="currentImage" class="mt-2 hidden">
                        <p class="text-sm text-gray-600">Gambar saat ini:</p>
                        <img id="currentImagePreview" src="" class="h-20 w-20 object-cover rounded mt-1">
                    </div>
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-teal-600 text-white py-2 rounded-lg hover:bg-teal-700">Simpan</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-500 text-white py-2 rounded-lg hover:bg-gray-600">Batal</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // ==================== KONFIGURASI ====================
    // 🔴 WAJIB GANTI DENGAN DATA SUPABASE ANDA 🔴
    const SUPABASE_URL = "https://xxxxxxxxxxxx.supabase.co";  // GANTI!
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";  // GANTI!
    const ADMIN_PASSWORD = "admin123";
    // ===================================================
    
    let supabaseClient = null;
    
    // Cek koneksi Supabase
    async function testSupabaseConnection() {
        if (!SUPABASE_URL || SUPABASE_URL === "https://xxxxxxxxxxxx.supabase.co") {
            Swal.fire('Error Konfigurasi', 'SUPABASE_URL belum diisi! Silakan edit file admin.html', 'error');
            return false;
        }
        if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes("eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...")) {
            Swal.fire('Error Konfigurasi', 'SUPABASE_ANON_KEY belum diisi! Silakan edit file admin.html', 'error');
            return false;
        }
        
        try {
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            // Test query sederhana
            const { error } = await supabase.from('produk').select('count', { count: 'exact', head: true });
            if (error && error.message.includes('relation')) {
                Swal.fire('Error Tabel', 'Tabel "produk" belum ada di Supabase! Buat tabel terlebih dahulu.', 'error');
                return false;
            }
            supabaseClient = supabase;
            return true;
        } catch (error) {
            Swal.fire('Koneksi Gagal', 'Tidak bisa terhubung ke Supabase. Periksa URL dan ANON KEY.\n\nError: ' + error.message, 'error');
            return false;
        }
    }
    
    async function checkPassword() {
        const password = document.getElementById('passwordInput').value;
        if (password === ADMIN_PASSWORD) {
            // Test koneksi Supabase sebelum masuk
            const connected = await testSupabaseConnection();
            if (connected) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                loadProducts();
            }
        } else {
            Swal.fire('Error', 'Password salah!', 'error');
        }
    }
    
    function logout() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminDashboard').style.display = 'none';
        document.getElementById('passwordInput').value = '';
    }
    
    function getSupabase() {
        if (!supabaseClient) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }
        return supabaseClient;
    }
    
    async function loadProducts() {
        const container = document.getElementById('productsContainer');
        container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-2xl"></i> Memuat produk...</div>';
        
        const supabase = getSupabase();
        
        try {
            const { data, error } = await supabase.from('produk').select('*').order('created_at', { ascending: false });
            
            if (error) {
                console.error('Supabase error:', error);
                container.innerHTML = `<div class="text-center py-10 text-red-500">Error: ${error.message}<br><br>${error.hint ? 'Hint: ' + error.hint : ''}</div>`;
                return;
            }
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-gray-500">📦 Belum ada produk. Klik "Tambah Produk" untuk menambahkan.</div>';
                return;
            }
            
            container.innerHTML = `
                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="table-wrapper">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Gambar</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Nama</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Kategori</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Harga</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                ${data.map(product => `
                                    <tr class="hover:bg-gray-50">
                                        <td class="px-4 py-3">
                                            ${product.gambar_url ? `<img src="${product.gambar_url}" class="h-10 w-10 object-cover rounded">` : '<i class="fas fa-image text-gray-400"></i>'}
                                         </td>
                                        <td class="px-4 py-3 font-medium">${escapeHtml(product.nama)}</td>
                                        <td class="px-4 py-3">${escapeHtml(product.kategori) || '-'}</td>
                                        <td class="px-4 py-3">Rp ${product.harga.toLocaleString('id-ID')}</td>
                                        <td class="px-4 py-3">
                                            <button onclick="editProduct(${product.id})" class="text-blue-600 hover:text-blue-800 mr-2"><i class="fas fa-edit"></i> Edit</button>
                                            <button onclick="deleteProduct(${product.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i> Hapus</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        } catch (error) {
            console.error('Load error:', error);
            container.innerHTML = `<div class="text-center py-10 text-red-500">❌ Gagal memuat produk: ${error.message}</div>`;
        }
    }
    
    async function uploadImage(file) {
        const supabase = getSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
        const filePath = `produk-images/${fileName}`;
        
        // Cek apakah bucket ada
        const { error: bucketError } = await supabase.storage.getBucket('produk-images');
        if (bucketError) {
            throw new Error('Bucket "produk-images" tidak ditemukan. Buat bucket terlebih dahulu di Supabase Storage.');
        }
        
        const { error } = await supabase.storage.from('produk-images').upload(filePath, file);
        if (error) throw error;
        
        const { data: { publicUrl } } = supabase.storage.from('produk-images').getPublicUrl(filePath);
        return publicUrl;
    }
    
    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const supabase = getSupabase();
        const id = document.getElementById('productId').value;
        const nama = document.getElementById('nama').value;
        const kategori = document.getElementById('kategori').value;
        const harga = parseInt(document.getElementById('harga').value);
        const deskripsi = document.getElementById('deskripsi').value;
        const gambarFile = document.getElementById('gambar').files[0];
        
        try {
            let gambarUrl = document.getElementById('currentImagePreview').src;
            if (gambarFile) {
                const uploading = await Swal.fire({ title: 'Uploading...', text: 'Mengupload gambar...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                gambarUrl = await uploadImage(gambarFile);
                Swal.close();
            }
            
            const productData = { nama, kategori, harga, deskripsi, gambar_url: gambarUrl || null };
            
            let result;
            if (id) {
                result = await supabase.from('produk').update(productData).eq('id', parseInt(id));
            } else {
                result = await supabase.from('produk').insert([productData]);
            }
            
            if (result.error) throw result.error;
            
            Swal.fire('Sukses', id ? 'Produk berhasil diupdate!' : 'Produk berhasil ditambahkan!', 'success');
            closeModal();
            loadProducts();
        } catch (error) {
            console.error('Save error:', error);
            Swal.fire('Error', error.message, 'error');
        }
    });
    
    async function editProduct(id) {
        const supabase = getSupabase();
        const { data, error } = await supabase.from('produk').select('*').eq('id', id).single();
        if (error) return Swal.fire('Error', error.message, 'error');
        
        document.getElementById('productId').value = data.id;
        document.getElementById('nama').value = data.nama;
        document.getElementById('kategori').value = data.kategori || '';
        document.getElementById('harga').value = data.harga;
        document.getElementById('deskripsi').value = data.deskripsi || '';
        
        if (data.gambar_url) {
            document.getElementById('currentImagePreview').src = data.gambar_url;
            document.getElementById('currentImage').classList.remove('hidden');
        } else {
            document.getElementById('currentImage').classList.add('hidden');
        }
        
        document.getElementById('modalTitle').innerText = 'Edit Produk';
        document.getElementById('productModal').classList.remove('hidden');
        document.getElementById('productModal').classList.add('flex');
    }
    
    async function deleteProduct(id) {
        const confirm = await Swal.fire({ title: 'Yakin hapus?', text: "Produk akan dihapus permanen!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Ya, hapus!' });
        if (confirm.isConfirmed) {
            const supabase = getSupabase();
            const { error } = await supabase.from('produk').delete().eq('id', id);
            if (error) return Swal.fire('Error', error.message, 'error');
            Swal.fire('Terhapus!', 'Produk berhasil dihapus.', 'success');
            loadProducts();
        }
    }
    
    function showAddModal() {
        document.getElementById('productForm').reset();
        document.getElementById('productId').value = '';
        document.getElementById('currentImage').classList.add('hidden');
        document.getElementById('modalTitle').innerText = 'Tambah Produk';
        document.getElementById('productModal').classList.remove('hidden');
        document.getElementById('productModal').classList.add('flex');
    }
    
    function closeModal() {
        document.getElementById('productModal').classList.add('hidden');
        document.getElementById('productModal').classList.remove('flex');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
